name: Build Tweak & Dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid make dpkg
          echo "/usr/local/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        run: |
          export THEOS="${{ github.workspace }}/theos"
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
          # Clone Theos
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          
          # Clone iOS SDKs
          git clone https://github.com/theos/sdks.git "$THEOS/sdks"
          
          echo "Theos installed at: $THEOS"
          ls -la "$THEOS"

      - name: Cache Theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-theos-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Build Project
        run: |
          export THEOS="${{ github.workspace }}/theos"
          
          # Build a clean release package
          make clean
          make package FINALPACKAGE=1
          
          # Create a directory to gather artifacts for download
          mkdir -p build_output
          
          # Find and copy the compiled .dylib file
          find .theos/obj/ -name "MyGameCheat.dylib" -exec cp {} build_output/ \;
          
          # Copy the packaged .deb file
          if [ -d "packages" ]; then
            cp packages/*.deb build_output/
          fi
          
          echo "Build Output Files:"
          ls -la build_output/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyGameCheat-Build
          path: build_output/*
          if-no-files-found: error