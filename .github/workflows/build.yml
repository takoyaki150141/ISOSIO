name: Build Tweak & Dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: beerpiss/theos-action@v1
        with:
          cache: true

      - name: Ultra Clean & Debug
        run: |
          rm -rf .theos/ packages/ obj/ build_output/
          find . -name "*.o" -delete
          find . -name "*.dylib" -delete
          
          echo "=== Makefile ==="
          cat Makefile
          echo ""
          echo "=== src/main.mm first 30 lines ==="
          head -n 30 src/main.mm
          echo ""
          echo "=== All @class declarations ==="
          grep -n "@class" src/main.mm || echo "No @class found"
          echo ""
          echo "=== All OverlayWindow references ==="
          grep -n "OverlayWindow" src/main.mm

      - name: Build Project
        run: |
          make clean
          make package FINALPACKAGE=1
          
          mkdir -p build_output
          find .theos/obj/ -name "MyGameCheat.dylib" -exec cp {} build_output/ \;
          
          if [ -d "packages" ]; then
            cp packages/*.deb build_output/
          fi
          
          echo "Build Output Files:"
          ls -la build_output/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyGameCheat-Build
          path: build_output/*
          if-no-files-found: error