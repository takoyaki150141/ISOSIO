name: Build Tweak & Dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: beerpiss/theos-action@v1
        with:
          cache: true

      - name: Build Project
        run: |
          # Build a clean release package
          make clean
          make package FINALPACKAGE=1
          
          # Create a directory to gather artifacts for download
          mkdir -p build_output
          
          # Find and copy the compiled .dylib file
          # Theos outputs it into .theos/obj/ or .theos/obj/debug/ depending on settings
          find .theos/obj/ -name "MyGameCheat.dylib" -exec cp {} build_output/ \;
          
          # Copy the packaged .deb file
          if [ -d "packages" ]; then
            cp packages/*.deb build_output/
          fi
          
          echo "Build Output Files:"
          ls -la build_output/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyGameCheat-Build
          path: build_output/*
          if-no-files-found: error
