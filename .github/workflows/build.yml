name: Build Tweak & Dylib

on:
  push:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid make dpkg
          echo "/usr/local/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Restore Theos Cache
        id: cache-theos-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-theos-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Setup Theos
        if: steps.cache-theos-restore.outputs.cache-hit != 'true'
        run: |
          export THEOS="${{ github.workspace }}/theos"
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
          rm -rf "$THEOS"
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          
          if [ ! -d "$THEOS/sdks" ]; then
            git clone https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          echo "Theos installed at: $THEOS"
          ls -la "$THEOS"

      - name: Set THEOS env
        run: echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Save Theos Cache
        if: steps.cache-theos-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-theos-${{ hashFiles('**/Makefile') }}

      - name: Build Dylib Only
        run: |
          make clean
          make all FINALPACKAGE=1
          
          mkdir -p build_output
          find .theos/obj/ -name "MyGameCheat.dylib" -exec cp {} build_output/ \;
          
          echo "Build Output Files:"
          ls -la build_output/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyGameCheat-Dylib
          path: build_output/*
          if-no-files-found: error